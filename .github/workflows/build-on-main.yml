name: Build on main

on:
  push:
    branches:
      - main

concurrency:
  group: build-on-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload built docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: built-docs
          path: docs
          if-no-files-found: error

  commit-docs:
    if: github.actor != 'github-actions[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download built docs artifact
        uses: actions/download-artifact@v8
        with:
          name: built-docs
          path: /tmp/built-docs

      - name: Check whether this run is still current
        id: current-run
        run: |
          git fetch origin main
          latest_main_sha="$(git rev-parse origin/main)"

          if [ "$latest_main_sha" = "${{ github.sha }}" ]; then
            echo "is_current=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_current=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace docs with built output
        if: steps.current-run.outputs.is_current == 'true'
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R /tmp/built-docs/. docs/

      - name: Check for docs changes
        id: docs-changes
        if: steps.current-run.outputs.is_current == 'true'
        run: |
          if git diff --quiet -- docs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated docs
        if: steps.docs-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: update docs from build"
          git push
